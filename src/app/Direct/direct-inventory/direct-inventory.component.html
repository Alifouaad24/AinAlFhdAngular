<div *ngIf="ItemsInventory.length > 0"
  class="mb-4 px-2 py-2 d-flex flex-column gap-2 align-items-end justify-content-start">

  <label class="fw-bold text-dark d-flex align-items-center">
    <i class="bi bi-funnel-fill text-primary ms-2 me-2 p-2"></i>
    تصفية حسب المقاس
  </label>

  <select dir="rtl"
    class="form-control p-2 form-control-lg border-primary shadow-sm rounded-pill w-100 w-md-50 w-lg-25"
    (change)="filterBySize($event)">
    <option value="" disabled selected>اختر المقاس</option>
    <option value="">All</option>
    <option *ngFor="let item of getDistinctBySize()" [value]="item.size?.id">
      {{ item.size?.description }}
    </option>
  </select>

</div>

<div class="table-responsive shadow-lg rounded-4 p-3 bg-white">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">
    <div class="p-1">عدد المنتجات: <strong class="text-danger">({{ countOfItems }})</strong></div>

    <button class="btn btn-success rounded-pill px-4 w-100 w-md-auto"
      (click)="downloadAllImagesAsZip()">
      تحميل كل الصور ({{ countOfItems }})
    </button>
  </div>

  <table class="table table-hover table-bordered align-middle text-center mb-0 mt-3">
    <thead class="table-primary text-dark">
      <tr>
        <!-- <th>عمليات</th> -->
        <!-- <th>الكمية</th>
        <th>السعر</th>
        <th>المقاس</th>
        <th>الفئة</th>
        <th>SKU</th> -->
        <th>صورة المنتج</th>
      </tr>
    </thead>

    <tbody *ngIf="ItemsInventory; else noData">
      <tr *ngFor="let item of ItemsInventory">
        <!-- <td class="d-flex flex-wrap gap-1 justify-content-center">
          <button (click)="openModalToEdit(item)" class="btn btn-warning btn-sm shadow-sm" title="تعديل">
            <i class="fas fa-edit"></i>
          </button>

          <button (click)="openSwalToDelete(item.inventory_id)" class="btn btn-danger btn-sm shadow-sm"
            title="حذف">
            <i class="fas fa-trash"></i>
          </button>
        </td> -->

        <!-- <td class="fw-bold">{{ item.qty }}</td>
        <td class="text-success fw-bold">{{ item.sellingprice }}</td>
        <td>{{ item.size?.description || '-' }}</td>
        <td>{{ item.item?.category?.categoryName || '-' }}</td>

        <td class="text-primary fw-medium">
          <a [href]="'https://ar.shein.com/pdsearch/' + item.item?.pCode" target="_blank">
            {{ item.item?.pCode }}
          </a>
        </td> -->

        <td>
          <img (click)="openImage(item.item_notes, item.item.pCode)" [src]="item.item_notes"
            class="img-fluid rounded border"
            style="max-width: 80px; height: auto; object-fit: cover; cursor: pointer;"
            alt="not found" />
        </td>
      </tr>
    </tbody>

  </table>

  <ng-template #noData>
    <div class="text-center p-4 text-muted">
      لا توجد بيانات لعرضها
    </div>
  </ng-template>
</div>


<!-- Image Modal -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-body text-center position-relative">

        <img [src]="selectedImage" class="img-fluid rounded" alt="Image" />

        <button class="btn btn-primary rounded-pill shadow"
          (click)="downloadImage()"
          style="position: absolute; top: 10px; right: 10px;">
          تحميل
        </button>

      </div>
    </div>
  </div>
</div>
